<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>USPC2026 Partnership Report</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
[data-theme="dark"] {
  --bg:#0c0c0f;
  --surface:#141418;
  --surface2:#1c1c22;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#f0f0f2;
  --muted:#8888a0;
  --dim:#55556a;
  --green:#3ddc84;
  --green-bg:rgba(61,220,132,0.11);
  --amber:#ffb347;
  --amber-bg:rgba(255,179,71,0.11);
  --red:#ff6b6b;
  --red-bg:rgba(255,107,107,0.10);
  --accent:#3ddc84;
}

[data-theme="light"] {
  --bg:#f4f5f7;
  --surface:#ffffff;
  --surface2:#f0f1f4;
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.13);
  --text:#111118;
  --muted:#666680;
  --dim:#aaaabc;
  --green:#1a9a56;
  --green-bg:rgba(26,154,86,0.09);
  --amber:#c47a00;
  --amber-bg:rgba(196,122,0,0.09);
  --red:#cc3333;
  --red-bg:rgba(204,51,51,0.08);
  --accent:#1a9a56;
}

* {
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,
body {
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  min-height:100vh;
}

.shell {
  max-width:1220px;
  margin:0 auto;
  padding:28px 20px 64px;
}

.hdr {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:14px;
  margin-bottom:24px;
  border-bottom:1px solid var(--border);
  padding-bottom:20px;
}

.hdr-left h1 {
  font-size:25px;
  font-weight:800;
  letter-spacing:-.03em;
}

.hdr-left h1 span {
  color:var(--accent);
}

.hdr-sub {
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--muted);
  margin-top:4px;
}

.hdr-right {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.period-box {
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:7px 13px;
  text-align:right;
}

.period-box .wk {
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:var(--muted);
  text-transform:uppercase;
}

.period-box .pd {
  font-size:12px;
  font-weight:700;
  margin-top:1px;
}

.ctrl-row {
  display:flex;
  align-items:center;
  gap:7px;
  flex-wrap:wrap;
}

.tab-bar {
  display:flex;
  gap:4px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:3px;
}

.tab {
  font-family:'DM Mono',monospace;
  font-size:10px;
  padding:5px 11px;
  border-radius:5px;
  cursor:pointer;
  border:none;
  background:transparent;
  color:var(--muted);
  font-weight:500;
}

.tab.active {
  background:var(--surface);
  color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,.25);
}

select.sel {
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:11px;
  border-radius:6px;
  padding:6px 9px;
  cursor:pointer;
  min-width:150px;
}

.btn {
  font-family:'DM Mono',monospace;
  font-size:11px;
  border-radius:7px;
  padding:6px 12px;
  cursor:pointer;
  border:1px solid;
  transition:all .15s;
  font-weight:500;
}

.btn-theme {
  background:var(--surface2);
  border-color:var(--border2);
  color:var(--muted);
  font-size:14px;
  padding:5px 9px;
  line-height:1;
}

.loading {
  text-align:center;
  padding:80px 20px;
  font-family:'DM Mono',monospace;
  color:var(--muted);
  font-size:12px;
}

.spinner {
  width:28px;
  height:28px;
  border:2px solid var(--border2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .65s linear infinite;
  margin:0 auto 14px;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.err-box {
  background:var(--red-bg);
  border:1px solid var(--red);
  border-radius:10px;
  padding:14px 18px;
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--red);
  margin-bottom:18px;
}

.notice {
  background:var(--amber-bg);
  border:1px solid rgba(196,122,0,0.25);
  border-radius:9px;
  padding:12px 15px;
  margin-bottom:22px;
  font-size:11px;
  color:var(--amber);
  font-family:'DM Mono',monospace;
  line-height:1.7;
}

.slbl {
  font-size:10px;
  font-weight:600;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-bottom:9px;
  font-family:'DM Mono',monospace;
}

.cards-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:26px;
}

.card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:15px 16px;
}

.card-lbl {
  font-size:9px;
  color:var(--muted);
  font-family:'DM Mono',monospace;
  text-transform:uppercase;
  letter-spacing:.07em;
}

.card-val {
  font-size:22px;
  font-weight:800;
  margin-top:5px;
  letter-spacing:-.02em;
}

.card-desc {
  font-size:10px;
  color:var(--dim);
  margin-top:4px;
  line-height:1.4;
}

.table-wrap {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:auto;
  margin-bottom:28px;
}

.tbl {
  width:100%;
  border-collapse:collapse;
}

.tbl thead th {
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:.07em;
  padding:8px 11px;
  text-align:right;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}

.tbl thead th:first-child {
  text-align:left;
}

.tbl tbody tr {
  border-bottom:1px solid var(--border);
}

.tbl tbody tr:hover {
  background:var(--surface2);
}

.tbl td {
  padding:11px 11px;
  font-size:12px;
  text-align:right;
  vertical-align:top;
}

.tbl td:first-child {
  text-align:left;
}

.tbl tfoot td {
  border-top:1px solid var(--border2);
  padding-top:12px;
  font-weight:700;
}

.mono {
  font-family:'DM Mono',monospace;
}

.money {
  font-family:'DM Mono',monospace;
  font-weight:600;
}

.comm {
  color:var(--accent);
  font-family:'DM Mono',monospace;
  font-weight:700;
}

.dim {
  color:var(--dim);
}

.order-link {
  font-family:'DM Mono',monospace;
  color:var(--accent);
  font-weight:600;
}

.product {
  max-width:280px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.customer {
  font-weight:700;
}

.badge {
  display:inline-flex;
  align-items:center;
  padding:2px 7px;
  border-radius:99px;
  font-size:9px;
  font-weight:600;
  font-family:'DM Mono',monospace;
  background:var(--green-bg);
  color:var(--green);
}

.footer {
  margin-top:32px;
  padding:13px 17px;
  background:var(--surface);
  border-radius:10px;
  border:1px solid var(--border);
  font-size:10px;
  color:var(--dim);
  font-family:'DM Mono',monospace;
  line-height:1.8;
}

.footer span {
  color:var(--muted);
}

@media (max-width:900px) {
  .cards-grid { grid-template-columns:repeat(2,1fr); }
}

@media (max-width:600px) {
  .cards-grid { grid-template-columns:1fr; }

  .hdr-right,
  .ctrl-row {
    width:100%;
  }

  select.sel {
    min-width:100%;
  }

  .tab-bar {
    width:100%;
  }

  .tab {
    flex:1;
  }
}
</style>
</head>

<body>
<div class="shell">

  <div class="hdr">
    <div class="hdr-left">
      <h1>USPC2026 <span>Partnership Report</span></h1>
      <div class="hdr-sub">Discount Code Sales · 10% Commission on Net Sales</div>
    </div>

    <div class="hdr-right">
      <div class="period-box">
        <div class="wk">period</div>
        <div class="pd" id="periodLabel">All 2026</div>
      </div>

      <div class="ctrl-row">
        <div class="tab-bar">
          <button class="tab active" id="tabAll" onclick="setView('all')">All 2026</button>
          <button class="tab" id="tabMonth" onclick="setView('month')">By Month</button>
          <button class="tab" id="tabQuarter" onclick="setView('quarter')">By Quarter</button>
        </div>

        <select class="sel" id="monthSelect" onchange="renderCurrent()" style="display:none"></select>

        <select class="sel" id="quarterSelect" onchange="renderCurrent()" style="display:none">
          <option value="1">Q1 · Jan–Mar</option>
          <option value="2">Q2 · Apr–Jun</option>
          <option value="3">Q3 · Jul–Sep</option>
          <option value="4">Q4 · Jul–Sep</option>
        </select>

        <button class="btn btn-theme" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">Light</button>
      </div>
    </div>
  </div>

  <div id="main">
    <div class="loading">
      <div class="spinner"></div>
      Loading report...
    </div>
  </div>

</div>

<script>
const MONTHS = [
  '',
  'January',
  'February',
  'March',
  'April',
  'May',
  'June',
  'July',
  'August',
  'September',
  'October',
  'November',
  'December'
];

let currentView = 'all';
let reportData = null;

function buildMonthOptions() {
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = '';

  for (let i = 1; i <= 12; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = MONTHS[i];
    sel.appendChild(opt);
  }

  const now = new Date();
  sel.value = now.getMonth() + 1;
}

buildMonthOptions();

const savedTheme = localStorage.getItem('uspcTheme');

if (savedTheme) {
  document.documentElement.setAttribute('data-theme', savedTheme);
}

updateThemeBtn();

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';

  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('uspcTheme', next);
  updateThemeBtn();
}

function updateThemeBtn() {
  const t = document.documentElement.getAttribute('data-theme');
  const btn = document.getElementById('themeBtn');

  if (btn) {
    btn.textContent = t === 'dark' ? 'Light' : 'Dark';
  }
}

function setView(view) {
  currentView = view;

  document.getElementById('tabAll').classList.toggle('active', view === 'all');
  document.getElementById('tabMonth').classList.toggle('active', view === 'month');
  document.getElementById('tabQuarter').classList.toggle('active', view === 'quarter');

  document.getElementById('monthSelect').style.display = view === 'month' ? '' : 'none';
  document.getElementById('quarterSelect').style.display = view === 'quarter' ? '' : 'none';

  renderCurrent();
}

async function loadReport() {
  try {
    const response = await fetch('data/uspc-2026.json?ts=' + Date.now());

    if (!response.ok) {
      throw new Error('Could not load data/uspc-2026.json');
    }

    reportData = await response.json();

    renderCurrent();

  } catch (error) {
    document.getElementById('main').innerHTML =
      '<div class="err-box">' + escHtml(error.message) + '</div>';
  }
}

function renderCurrent() {
  if (!reportData) return;

  let orders = reportData.orders || [];
  let periodLabel = 'All ' + reportData.year;

  if (currentView === 'month') {
    const month = Number(document.getElementById('monthSelect').value);
    orders = orders.filter((o) => Number(o.month) === month);
    periodLabel = MONTHS[month] + ' ' + reportData.year;
  }

  if (currentView === 'quarter') {
    const quarter = String(document.getElementById('quarterSelect').value);
    orders = orders.filter((o) => String(o.quarter) === 'Q' + quarter);
    periodLabel = 'Q' + quarter + ' ' + reportData.year;
  }

  document.getElementById('periodLabel').textContent = periodLabel;

  const totals = buildTotals(orders);

  let html = '';

  html += '<div class="notice">';
  html += '<b>Discount Code:</b> ' + escHtml(reportData.discount_code) + '<br>';
  html += '<b>Commission Rule:</b> Partner commission is calculated as <b>10% of Net Sales</b>.<br>';
  html += '<b>Net Sale:</b> Shopify discounted line item total after line discounts.<br>';
  html += '<b>External Report:</b> No COGS, cost, margin, profit, or internal tags are shown.<br>';
  html += 'Last sync: ' + escHtml(reportData.generated_label || reportData.generated || '—');
  html += '</div>';

  html += '<div class="slbl">Summary</div>';

  html += '<div class="cards-grid">';
  html += card('Net Sales', fmt(totals.net_sales), 'Total sales after discounts');
  html += card('Commission', fmt(totals.commission), '10% of Net Sales', true);
  html += card('Orders', totals.orders_count, 'Orders using USPC2026');
  html += card('Avg Net Sale', fmt(totals.avg_net_sale), 'Average per order');
  html += '</div>';

  html += '<div class="slbl">Monthly View</div>';
  html += renderMonthlyTable(reportData.monthly || []);

  html += '<div class="slbl">Quarterly Payment View</div>';
  html += renderQuarterlyTable(reportData.quarterly || []);

  html += '<div class="slbl">Sales Detail</div>';
  html += renderOrdersTable(orders);

  html += '<div class="footer">';
  html += '<span>Calculation:</span> Commission = Net Sale × 10%.<br>';
  html += '<span>Discount Code:</span> Only orders using USPC2026 are included in the generated data file.<br>';
  html += '<span>Security:</span> Shopify token is used only inside GitHub Actions secrets, never in this public page.<br>';
  html += '<span>Data Source:</span> Shopify Admin API via GitHub Actions.';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

function card(label, value, desc, accent) {
  return ''
    + '<div class="card">'
    + '<div class="card-lbl">' + escHtml(label) + '</div>'
    + '<div class="card-val" style="' + (accent ? 'color:var(--accent)' : '') + '">' + value + '</div>'
    + '<div class="card-desc">' + escHtml(desc) + '</div>'
    + '</div>';
}

function renderMonthlyTable(rows) {
  let totalNet = 0;
  let totalComm = 0;
  let totalOrders = 0;

  const body = rows.map((r) => {
    totalNet += r.net_sales || 0;
    totalComm += r.commission || 0;
    totalOrders += r.orders_count || 0;

    return ''
      + '<tr>'
      + '<td><b>' + escHtml(r.month_name) + '</b></td>'
      + '<td class="mono">' + escHtml(r.orders_count || 0) + '</td>'
      + '<td class="money">' + fmt(r.net_sales) + '</td>'
      + '<td class="comm">' + fmt(r.commission) + '</td>'
      + '</tr>';
  }).join('');

  return ''
    + '<div class="table-wrap">'
    + '<table class="tbl">'
    + '<thead><tr>'
    + '<th>Month</th>'
    + '<th>Orders</th>'
    + '<th>Net Sales</th>'
    + '<th>Commission</th>'
    + '</tr></thead>'
    + '<tbody>' + body + '</tbody>'
    + '<tfoot><tr>'
    + '<td>Total</td>'
    + '<td class="mono">' + totalOrders + '</td>'
    + '<td class="money">' + fmt(totalNet) + '</td>'
    + '<td class="comm">' + fmt(totalComm) + '</td>'
    + '</tr></tfoot>'
    + '</table>'
    + '</div>';
}

function renderQuarterlyTable(rows) {
  let totalNet = 0;
  let totalComm = 0;
  let totalOrders = 0;

  const body = rows.map((r) => {
    totalNet += r.net_sales || 0;
    totalComm += r.commission || 0;
    totalOrders += r.orders_count || 0;

    return ''
      + '<tr>'
      + '<td><b>' + escHtml(r.quarter) + '</b><div class="dim mono">' + escHtml(r.period) + '</div></td>'
      + '<td class="mono">' + escHtml(r.orders_count || 0) + '</td>'
      + '<td class="money">' + fmt(r.net_sales) + '</td>'
      + '<td class="comm">' + fmt(r.commission) + '</td>'
      + '</tr>';
  }).join('');

  return ''
    + '<div class="table-wrap">'
    + '<table class="tbl">'
    + '<thead><tr>'
    + '<th>Quarter</th>'
    + '<th>Orders</th>'
    + '<th>Net Sales</th>'
    + '<th>Commission Payable</th>'
    + '</tr></thead>'
    + '<tbody>' + body + '</tbody>'
    + '<tfoot><tr>'
    + '<td>Total</td>'
    + '<td class="mono">' + totalOrders + '</td>'
    + '<td class="money">' + fmt(totalNet) + '</td>'
    + '<td class="comm">' + fmt(totalComm) + '</td>'
    + '</tr></tfoot>'
    + '</table>'
    + '</div>';
}

function renderOrdersTable(orders) {
  if (!orders.length) {
    return '<div class="notice">No orders found for this period using discount code USPC2026.</div>';
  }

  const body = orders.map((o) => {
    return ''
      + '<tr>'
      + '<td>'
      + '<div class="order-link">' + escHtml(o.order) + '</div>'
      + '<div class="dim mono">' + escHtml(o.date_short) + '</div>'
      + '</td>'
      + '<td><div class="customer">' + escHtml(o.customer) + '</div></td>'
      + '<td>'
      + '<div class="product" title="' + escHtml(o.product) + '">' + escHtml(o.product) + '</div>'
      + '<div class="dim mono">Qty: ' + escHtml(o.quantity) + '</div>'
      + '</td>'
      + '<td><span class="badge">' + escHtml(o.discount_code || 'USPC2026') + '</span></td>'
      + '<td class="money">' + fmt(o.net_sale) + '</td>'
      + '<td class="comm">' + fmt(o.commission) + '</td>'
      + '</tr>';
  }).join('');

  return ''
    + '<div class="table-wrap">'
    + '<table class="tbl">'
    + '<thead><tr>'
    + '<th>Order / Date</th>'
    + '<th>Customer</th>'
    + '<th>Product</th>'
    + '<th>Discount Code</th>'
    + '<th>Net Sale</th>'
    + '<th>Commission</th>'
    + '</tr></thead>'
    + '<tbody>' + body + '</tbody>'
    + '</table>'
    + '</div>';
}

function buildTotals(lines) {
  const uniqueOrders = new Set();
  let netSales = 0;
  let commission = 0;

  for (const line of lines) {
    uniqueOrders.add(line.order);
    netSales += Number(line.net_sale || 0);
    commission += Number(line.commission || 0);
  }

  return {
    orders_count: uniqueOrders.size,
    line_items_count: lines.length,
    net_sales: round2(netSales),
    commission: round2(commission),
    avg_net_sale: uniqueOrders.size ? round2(netSales / uniqueOrders.size) : 0
  };
}

function fmt(n) {
  n = Number(n || 0);
  return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function escHtml(v) {
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function round2(value) {
  return Math.round(Number(value || 0) * 100) / 100;
}

loadReport();
</script>
</body>
</html>
